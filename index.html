<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>World Cup 2026 Tips</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Anton&family=DM+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
:root{--ink:#0A0E13;--panel:#121922;--panel2:#1A232E;--line:#243140;--text:#E8EEF4;--dim:#8A9AAB;--lime:#C6FF3D;--coral:#FF5A47;--gold:#FFC94D;}
*{box-sizing:border-box}html,body{margin:0}
body{background:var(--ink);color:var(--text);font-family:'DM Sans',sans-serif;padding-bottom:50px}
input{font-family:inherit}input::-webkit-outer-spin-button,input::-webkit-inner-spin-button{-webkit-appearance:none}
.anton{font-family:'Anton',sans-serif;letter-spacing:.02em}
.wrap{max-width:960px;margin:0 auto;padding:0 18px}
.header{border-bottom:1px solid var(--line);background:linear-gradient(180deg,#0e141b,#0a0e13);position:sticky;top:0;z-index:20}
.header .wrap{display:flex;align-items:center;justify-content:space-between;padding:14px 18px}
.logo{cursor:pointer;display:flex;align-items:center;gap:10px;font-family:'Anton';font-size:22px;letter-spacing:.03em}
.logo .y{color:var(--lime)}
.btn{border:none;cursor:pointer;border-radius:10px;font-weight:700;padding:11px 18px;font-size:14px;transition:transform .08s}
.btn:active{transform:scale(.97)}.btn:disabled{opacity:.45;cursor:not-allowed}
.btn.sm{padding:7px 12px;font-size:13px}
.btn.primary{background:var(--lime);color:#08110A}.btn.coral{background:var(--coral);color:#fff}
.btn.dark{background:var(--panel2);color:var(--text);border:1px solid var(--line)}.btn.ghost{background:transparent;color:var(--text);border:1px solid var(--line)}
.row{display:flex;gap:8px}
.field{background:var(--panel);color:var(--text);border:1px solid var(--line);border-radius:10px;padding:12px 14px;font-size:15px;outline:none;width:100%}
.field:focus{border-color:var(--lime)}
.notice{display:flex;align-items:center;gap:8px;border-radius:10px;padding:10px 14px;margin-bottom:18px;font-size:13px;font-weight:600}
.notice.warn{background:var(--panel2);border:1px solid var(--coral);color:var(--coral)}
.notice.ok{background:var(--panel2);border:1px solid var(--lime);color:var(--lime)}
.notice.info{background:var(--panel2);border:1px solid var(--line);color:var(--dim)}
.card{background:var(--panel);border:1px solid var(--line);border-radius:14px}
.grp{overflow:hidden;border-radius:14px;border:1px solid var(--line);background:var(--panel)}
.grp-head{width:100%;display:flex;align-items:center;justify-content:space-between;padding:14px 16px;background:transparent;border:none;cursor:pointer;color:var(--text)}
.grp-head .l{display:flex;align-items:center;gap:12px}
.grp-head .g{font-family:'Anton';font-size:26px;color:var(--lime);line-height:1}
.grp-head .teams{color:var(--dim);font-size:13px}
.fix{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:10px;background:var(--ink);border-radius:10px;padding:8px 12px}
.fix .h{text-align:right;font-size:14px;font-weight:600}.fix .a{font-size:14px;font-weight:600}
.score{width:38px;height:38px;text-align:center;background:var(--ink);color:var(--text);border:1px solid var(--line);border-radius:8px;font-size:16px;font-weight:700;outline:none}
.score:focus{border-color:var(--lime)}
.pickrow{display:grid;grid-template-columns:1fr auto 1fr;gap:6px}
.pk{padding:11px 8px;border-radius:9px;font-size:13px;font-weight:700;background:var(--panel2);color:var(--text);border:1px solid var(--line);cursor:pointer;text-align:center;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pk.draw{font-weight:600;color:var(--dim);padding-left:16px;padding-right:16px}
.pk.on{background:var(--lime);color:#08110A;border-color:var(--lime)}
.pk.on.draw{background:var(--gold);color:#1a1300;border-color:var(--gold)}
.pk:disabled{cursor:default;opacity:.7}
.tbl .tr{display:grid;grid-template-columns:18px 1fr 30px 30px 30px;font-size:13px;padding:3px 0}
.muted{color:var(--dim)}
.ko-scroll{overflow-x:auto;padding-bottom:8px}
.ko{display:flex;gap:14px;min-width:1040px}
.ko-col{flex:0 0 188px;display:flex;flex-direction:column}
.ko-col .lbl{font-size:11px;text-transform:uppercase;letter-spacing:.08em;color:var(--dim);margin-bottom:8px;font-weight:700}
.ko-matches{display:flex;flex-direction:column;justify-content:space-around;gap:6px;height:100%}
.ko-m{display:grid;gap:4px;background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:6px}
.ko-m .mid{font-size:9px;color:var(--dim);letter-spacing:.05em}
.pill{width:100%;text-align:left;padding:7px 9px;border-radius:8px;font-size:12px;font-weight:600;background:var(--panel2);color:var(--text);border:1px solid var(--line);cursor:pointer;min-height:30px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pill.empty{background:transparent;color:var(--dim);cursor:default}
.pill.pick{background:var(--lime);color:#08110A;border-color:var(--lime);font-weight:800}
.pill.dim{opacity:.4}
.stat{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:16px 18px}
.stat .n{font-family:'Anton';font-size:34px;color:var(--lime);line-height:1}
.lb-row{display:grid;grid-template-columns:34px 1fr auto;align-items:center;gap:10px;background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:10px 14px}
.lb-row.top{background:linear-gradient(90deg,#1b2a10,#121922);border-color:var(--lime)}
.lb-rank{font-family:'Anton';font-size:20px;color:var(--dim)}
.spin{display:inline-block;animation:sp 1s linear infinite}@keyframes sp{to{transform:rotate(360deg)}}
.sel{background:var(--ink);color:var(--text);border:1px solid var(--line);border-radius:8px;padding:8px;font-size:13px;width:100%}
.tabbar{display:flex;gap:8px;margin-bottom:18px;flex-wrap:wrap}
a{color:var(--lime)}
</style>
</head>
<body>
<div class="header"><div class="wrap">
  <div class="logo" data-action="nav-home">⚑ WORLD CUP <span class="y">’26</span> TIPS</div>
  <div class="row"><button class="btn sm dark" data-action="nav-board">🏆</button><button class="btn sm dark" data-action="nav-admin">🛡️</button></div>
</div></div>
<div class="wrap" style="padding-top:24px"><div id="main"></div></div>
<script>
/* ===== CONFIG ===== */
var BACKEND_URL = "";
var ADMIN_PASSCODE = "MDA2026";
var GROUP_DEADLINE_DEFAULT = "2026-06-11T16:00:00Z";
var KO_DEADLINE_DEFAULT = "2026-06-28T16:00:00Z";
var SCORING = { groupResult:3, reachR16:2, reachQF:3, reachSF:5, reachFinal:8, champion:15, third:6 };
function actualOutcome(s){ if(!s||s.h===""||s.h==null||s.a===""||s.a==null) return null; var h=+s.h,a=+s.a; if(isNaN(h)||isNaN(a)) return null; return h>a?'H':(h<a?'A':'D'); }

/* ===== DATA ===== */
var GROUPS = {A:["Mexico","South Korea","South Africa","Czechia"],B:["Canada","Switzerland","Qatar","Bosnia-Herzegovina"],C:["Brazil","Morocco","Scotland","Haiti"],D:["USA","Paraguay","Australia","Turkiye"],E:["Germany","Ecuador","Ivory Coast","Curacao"],F:["Netherlands","Japan","Tunisia","Sweden"],G:["Belgium","Iran","Egypt","New Zealand"],H:["Spain","Uruguay","Saudi Arabia","Cape Verde"],I:["France","Senegal","Norway","Iraq"],J:["Argentina","Austria","Algeria","Jordan"],K:["Portugal","Colombia","Uzbekistan","DR Congo"],L:["England","Croatia","Panama","Ghana"]};
var GK = Object.keys(GROUPS);
var RR = [[0,1],[2,3],[0,2],[3,1],[0,3],[1,2]];
var FIXTURES = [];
GK.forEach(function(g){ RR.forEach(function(p,i){ FIXTURES.push({id:g+"-"+i, group:g, h:GROUPS[g][p[0]], a:GROUPS[g][p[1]]}); }); });

/* Official 2026 Round of 32 fixture definitions (M73-M88) */
var R32_DEFS = [
 {id:'M73', a:{t:'2',g:'A'}, b:{t:'2',g:'B'}},
 {id:'M74', a:{t:'1',g:'E'}, b:{t:'3',set:['A','B','C','D','F']}},
 {id:'M75', a:{t:'1',g:'F'}, b:{t:'2',g:'C'}},
 {id:'M76', a:{t:'1',g:'C'}, b:{t:'2',g:'F'}},
 {id:'M77', a:{t:'1',g:'I'}, b:{t:'3',set:['C','D','F','G','H']}},
 {id:'M78', a:{t:'2',g:'E'}, b:{t:'2',g:'I'}},
 {id:'M79', a:{t:'1',g:'A'}, b:{t:'3',set:['C','E','F','H','I']}},
 {id:'M80', a:{t:'1',g:'L'}, b:{t:'3',set:['E','H','I','J','K']}},
 {id:'M81', a:{t:'1',g:'D'}, b:{t:'3',set:['B','E','F','I','J']}},
 {id:'M82', a:{t:'1',g:'G'}, b:{t:'3',set:['A','E','H','I','J']}},
 {id:'M83', a:{t:'2',g:'K'}, b:{t:'2',g:'L'}},
 {id:'M84', a:{t:'1',g:'H'}, b:{t:'2',g:'J'}},
 {id:'M85', a:{t:'1',g:'B'}, b:{t:'3',set:['E','F','G','I','J']}},
 {id:'M86', a:{t:'1',g:'J'}, b:{t:'2',g:'H'}},
 {id:'M87', a:{t:'1',g:'K'}, b:{t:'3',set:['D','E','I','J','L']}},
 {id:'M88', a:{t:'2',g:'D'}, b:{t:'2',g:'G'}}
];
var THIRD_SLOTS = R32_DEFS.filter(function(d){ return d.b.t==='3'; }).map(function(d){ return {id:d.id, set:d.b.set}; });
var R16_DEFS = [['M89','M74','M77'],['M90','M73','M75'],['M91','M76','M78'],['M92','M79','M80'],['M93','M83','M84'],['M94','M81','M82'],['M95','M86','M88'],['M96','M85','M87']];
var QF_DEFS = [['M97','M89','M90'],['M98','M93','M94'],['M99','M91','M92'],['M100','M95','M96']];
var SF_DEFS = [['M101','M97','M98'],['M102','M99','M100']];
var FINAL_DEF = ['M104','M101','M102'];
var BRONZE_DEF = ['M103','M101','M102'];
var KO_COLS = [
 {label:'Round of 32', ids:R32_DEFS.map(function(d){return d.id;})},
 {label:'Round of 16', ids:R16_DEFS.map(function(d){return d[0];})},
 {label:'Quarter-finals', ids:QF_DEFS.map(function(d){return d[0];})},
 {label:'Semi-finals', ids:SF_DEFS.map(function(d){return d[0];})},
 {label:'Final', ids:['M104']}
];

/* ===== ENGINE: groups ===== */
function computeStandings(group, scores){
  var t={}; GROUPS[group].forEach(function(nm){ t[nm]={team:nm,gf:0,ga:0,pts:0}; });
  RR.forEach(function(pair,i){ var s=scores[group+"-"+i]; if(!s||s.h===""||s.a===""||s.h==null||s.a==null) return;
    var h=GROUPS[group][pair[0]],a=GROUPS[group][pair[1]],hg=+s.h,ag=+s.a; if(isNaN(hg)||isNaN(ag)) return;
    t[h].gf+=hg;t[h].ga+=ag;t[a].gf+=ag;t[a].ga+=hg;
    if(hg>ag)t[h].pts+=3; else if(hg<ag)t[a].pts+=3; else{t[h].pts++;t[a].pts++;} });
  return Object.keys(t).map(function(k){var x=t[k];x.gd=x.gf-x.ga;return x;})
    .sort(function(x,y){return y.pts-x.pts||y.gd-x.gd||y.gf-x.gf||x.team.localeCompare(y.team);});
}
function standingsByGroup(scores){ var o={}; GK.forEach(function(g){ o[g]=computeStandings(g,scores); }); return o; }
function bestThirds(scores){
  var T=[]; GK.forEach(function(g){ var st=computeStandings(g,scores); T.push(Object.assign({group:g}, st[2])); });
  return T.sort(function(x,y){return y.pts-x.pts||y.gd-x.gd||y.gf-x.gf||x.team.localeCompare(y.team);}).slice(0,8);
}
function computeQualifiers(scores){
  var W=[],R=[]; GK.forEach(function(g){ var st=computeStandings(g,scores); W.push(st[0]); R.push(st[1]); });
  function rk(a){return a.slice().sort(function(x,y){return y.pts-x.pts||y.gd-x.gd||y.gf-x.gf||x.team.localeCompare(y.team);});}
  var all=rk(W).concat(rk(R)).concat(bestThirds(scores)).map(function(x){return x.team;});
  return {all:all};
}
function groupsComplete(scores){ return FIXTURES.every(function(f){ var s=scores[f.id]; return s&&s.h!==""&&s.a!==""&&s.h!=null&&s.a!=null&&!isNaN(+s.h)&&!isNaN(+s.a); }); }

/* ===== ENGINE: knockout (fixed real bracket) ===== */
function resolveSide(side, sb, thirds, matchId){
  if(side.t==='1') return sb[side.g]&&sb[side.g][0]?sb[side.g][0].team:null;
  if(side.t==='2') return sb[side.g]&&sb[side.g][1]?sb[side.g][1].team:null;
  if(side.t==='3') return thirds[matchId]||null;
}
function resolveR32(scores, thirds){
  var sb=standingsByGroup(scores);
  return R32_DEFS.map(function(d){ return {id:d.id, a:resolveSide(d.a,sb,thirds,d.id), b:resolveSide(d.b,sb,thirds,d.id)}; });
}
function buildKO(scores, thirds, picks){
  var r={}; r.R32=resolveR32(scores,thirds);
  function feed(defs){ return defs.map(function(d){ return {id:d[0], a:picks[d[1]]||null, b:picks[d[2]]||null}; }); }
  r.R16=feed(R16_DEFS); r.QF=feed(QF_DEFS); r.SF=feed(SF_DEFS);
  r.F=[{id:'M104', a:picks['M101']||null, b:picks['M102']||null}];
  function loser(sfId){ var m=r.SF.filter(function(x){return x.id===sfId;})[0]; var w=picks[sfId]; if(!m||!m.a||!m.b||!w) return null; return w===m.a?m.b:m.a; }
  r.BR=[{id:'M103', a:loser('M101'), b:loser('M102')}];
  return r;
}
function byId(r){ var m={}; ['R32','R16','QF','SF','F','BR'].forEach(function(k){ r[k].forEach(function(x){ m[x.id]=x; }); }); return m; }
function thirdsComplete(thirds){ return THIRD_SLOTS.every(function(s){ return !!thirds[s.id]; }); }
function koReady(){ return !!S.config.koOpen && S.actual && groupsComplete(S.actual.groupScores) && thirdsComplete(S.actual.thirds||{}); }
function koComplete(scores, thirds, picks){
  var ids=R32_DEFS.map(function(d){return d.id;}).concat(R16_DEFS.map(function(d){return d[0];}),QF_DEFS.map(function(d){return d[0];}),SF_DEFS.map(function(d){return d[0];}),['M104','M103']);
  return ids.every(function(id){ return !!picks[id]; });
}
function reachedSets(picks){
  function w(ids){ return ids.map(function(id){return picks[id];}).filter(Boolean); }
  return { R16:w(R32_DEFS.map(function(d){return d.id;})), QF:w(R16_DEFS.map(function(d){return d[0];})),
    SF:w(QF_DEFS.map(function(d){return d[0];})), F:w(SF_DEFS.map(function(d){return d[0];})),
    champ:picks['M104']||null, third:picks['M103']||null };
}
function autoAssignThirds(scores){
  var thirds=bestThirds(scores); // [{team,group}]
  var slots=THIRD_SLOTS; var assign={}; var used={};
  function bt(i){ if(i>=slots.length) return true; var s=slots[i];
    for(var j=0;j<thirds.length;j++){ var th=thirds[j]; if(used[th.team]) continue; if(s.set.indexOf(th.group)<0) continue;
      assign[s.id]=th.team; used[th.team]=1; if(bt(i+1)) return true; delete assign[s.id]; used[th.team]=0; } return false; }
  return bt(0)?assign:null;
}

/* ===== SCORING ===== */
function scoreBracket(entry, actual){
  if(!actual) return null;
  var gPts=0; var picks=entry.groupPicks||{};
  FIXTURES.forEach(function(f){ var pick=picks[f.id], ao=actualOutcome(actual.groupScores[f.id]);
    if(pick && ao && pick===ao) gPts+=SCORING.groupResult; });
  var kPts=0;
  var aS=reachedSets(actual.koWinners||{}), mS=reachedSets(entry.koWinners||{});
  function inter(a,b){var s={};b.forEach(function(x){s[x]=1;});return a.filter(function(x){return s[x];});}
  kPts+=inter(mS.R16,aS.R16).length*SCORING.reachR16+inter(mS.QF,aS.QF).length*SCORING.reachQF
       +inter(mS.SF,aS.SF).length*SCORING.reachSF+inter(mS.F,aS.F).length*SCORING.reachFinal;
  if(mS.champ&&mS.champ===aS.champ) kPts+=SCORING.champion;
  if(mS.third&&mS.third===aS.third) kPts+=SCORING.third;
  return {gPts:gPts,kPts:kPts,total:gPts+kPts};
}
function submissionRow(entry){
  var s=reachedSets(entry.koWinners||{});
  var runner=s.F.filter(function(t){return t!==s.champ;})[0]||"";
  var headers=["Timestamp","Name","Stage","Champion","Runner-up","Third","Semi-finalists","Quarter-finalists","Round of 16"];
  var stage=entry.koSubmitted?"Knockouts":(entry.groupSubmitted?"Groups":"Draft");
  var row=[ entry.koSubmittedAt||entry.groupSubmittedAt?new Date(entry.koSubmittedAt||entry.groupSubmittedAt).toISOString():new Date().toISOString(),
    entry.name, stage, s.champ||"", runner, s.third||"", s.SF.join(", "), s.QF.join(", "), s.R16.join(", ") ];
  FIXTURES.forEach(function(f){ headers.push(f.group+": "+f.h+" v "+f.a); var pk=(entry.groupPicks||{})[f.id];
    row.push(pk==='H'?f.h:(pk==='A'?f.a:(pk==='D'?'Draw':''))); });
  return {headers:headers,row:row};
}

/* ===== BACKEND ===== */
function apiGet(){ if(!BACKEND_URL) return Promise.resolve(localState());
  return fetch(BACKEND_URL+"?t="+Date.now()).then(function(r){return r.json();}).catch(function(e){console.error(e);return localState();}); }
function apiPost(p){ if(!BACKEND_URL){ localPost(p); return Promise.resolve(); }
  return fetch(BACKEND_URL,{method:"POST",mode:"no-cors",headers:{"Content-Type":"text/plain;charset=utf-8"},body:JSON.stringify(p)}).catch(function(e){console.error(e);}); }
function ls(){ try{return window.localStorage;}catch(e){return null;} }
function localState(){ var s=ls(); if(!s) return {submissions:[],actual:null,config:null};
  function g(k,d){ try{return JSON.parse(s.getItem(k)||d);}catch(e){return JSON.parse(d);} }
  return {submissions:g("wc26_subs","[]"),actual:g("wc26_actual","null"),config:g("wc26_config","null")}; }
function localPost(p){ var s=ls(); if(!s) return;
  if(p.type==="submission"){ var subs=[];try{subs=JSON.parse(s.getItem("wc26_subs")||"[]");}catch(e){} subs=subs.filter(function(x){return x.name!==p.entry.name;}); subs.push(p.entry); s.setItem("wc26_subs",JSON.stringify(subs)); }
  else if(p.type==="results"){ s.setItem("wc26_actual",JSON.stringify(p.actual)); }
  else if(p.type==="config"){ s.setItem("wc26_config",JSON.stringify(p.config)); } }
function saveDraft(e){ var s=ls(); if(s){ try{s.setItem("wc26_draft_"+slug(e.name),JSON.stringify(e));}catch(x){} } }
function loadDraft(n){ var s=ls(); if(!s)return null; try{var d=s.getItem("wc26_draft_"+slug(n));return d?JSON.parse(d):null;}catch(e){return null;} }

/* ===== HELPERS ===== */
function slug(s){return (s||"").trim().toLowerCase().replace(/[^a-z0-9]+/g,"-").replace(/^-+|-+$/g,"").slice(0,60);}
function esc(s){return String(s==null?"":s).replace(/[&<>"']/g,function(c){return {"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c];});}

/* ===== STATE ===== */
var S = { view:"home", name:"", entry:null, tipTab:"groups",
  submissions:[], actual:null, config:{groupDeadline:GROUP_DEADLINE_DEFAULT,koDeadline:KO_DEADLINE_DEFAULT,koOpen:false,locked:false},
  loading:true, adminOk:false, adminTab:"results", passErr:false, adminScores:{}, adminThirds:{}, adminKo:{}, _openGroup:"A" };
function groupLocked(){ var c=S.config; return !!c.locked || Date.now()>new Date(c.groupDeadline||GROUP_DEADLINE_DEFAULT).getTime(); }
function koLocked(){ var c=S.config; return !!c.locked || Date.now()>new Date(c.koDeadline||KO_DEADLINE_DEFAULT).getTime(); }
function refresh(){ return apiGet().then(function(d){ S.submissions=d.submissions||[]; S.actual=d.actual||null;
  if(d.config) S.config=Object.assign({groupDeadline:GROUP_DEADLINE_DEFAULT,koDeadline:KO_DEADLINE_DEFAULT,koOpen:false,locked:false},d.config); }); }

/* ===== RENDER ===== */
function M(){ return document.getElementById("main"); }
function render(){
  if(S.loading){ M().innerHTML='<div style="text-align:center;padding:60px"><span class="spin">⟳</span></div>'; return; }
  var html="";
  if(S.view==="home") html=viewHome();
  else if(S.view==="tip") html=viewTip();
  else if(S.view==="board") html=viewBoard();
  else if(S.view==="admin") html=viewAdmin();
  M().innerHTML=html; postRender();
}
function viewHome(){
  var stats=[["48","teams"],["12","groups"],["72","group matches"],["104","matches total"]].map(function(s){return '<div class="stat"><div class="n">'+s[0]+'</div><div class="muted" style="font-size:13px">'+s[1]+'</div></div>';}).join("");
  var showName = !groupLocked() || (koReady() && !koLocked());
  var label = (groupLocked() && koReady()) ? "Continue to my bracket ›" : "Start tipping ›";
  var ph = (groupLocked() && koReady()) ? "Your name (same as Stage 1)" : "Your name";
  var nameBox = '<div class="row" style="flex-wrap:wrap;max-width:480px"><input id="nameInput" class="field" style="flex:1 1 220px" placeholder="'+ph+'" value="'+esc(S.name)+'"><button class="btn primary" data-action="start">'+label+'</button></div>'
    + '<div style="margin-top:10px"><button class="btn dark sm" data-action="nav-board">View leaderboard</button></div>';

function start(){ var v=(document.getElementById("nameInput")||{}).value||""; if(!v.trim())return; S.name=v.trim();
  var ex=S.submissions.filter(function(b){return slug(b.name)===slug(S.name);})[0];
  var d=loadDraft(S.name);
  var base={name:S.name,groupPicks:{},koWinners:{},groupSubmitted:false,koSubmitted:false,createdAt:Date.now()};
  S.entry=Object.assign(base, d||{}, ex||{});
  if(!S.entry.koWinners) S.entry.koWinners={}; if(!S.entry.groupPicks) S.entry.groupPicks={};
  S.tipTab = (koReady()&&S.entry.groupSubmitted&&!S.entry.koSubmitted)?"ko":"groups"; S.view="tip"; render(); }
function pickAction(mid,team){ var ctx=S.view==="admin"?"admin":"tip";
  var scores=ctx==="admin"?S.adminScores:S.actual.groupScores; var thirds=ctx==="admin"?S.adminThirds:S.actual.thirds;
  var picks=Object.assign({}, ctx==="admin"?S.adminKo:S.entry.koWinners);
  if(picks[mid]===team) return; picks[mid]=team;
  var changed=true; while(changed){ changed=false; var r=buildKO(scores,thirds,picks); var bi=byId(r);
    Object.keys(picks).forEach(function(id){ var m=bi[id]; if(m){ if(picks[id]!==m.a&&picks[id]!==m.b){ delete picks[id]; changed=true; } } }); }
  if(ctx==="admin") S.adminKo=picks; else S.entry.koWinners=picks; render(); }
function submitGroups(){ var e=Object.assign({},S.entry,{groupSubmitted:true,groupSubmittedAt:Date.now()}); S.entry=e;
  S.submissions=S.submissions.filter(function(b){return slug(b.name)!==slug(e.name);}).concat([e]);
  var sr=submissionRow(e); apiPost({type:"submission",entry:strip(e),headers:sr.headers,row:sr.row});
  setTimeout(function(){refresh().then(render);},1200); render(); }
function submitKo(){ var e=Object.assign({},S.entry,{koSubmitted:true,koSubmittedAt:Date.now()}); S.entry=e;
  S.submissions=S.submissions.filter(function(b){return slug(b.name)!==slug(e.name);}).concat([e]);
  var sr=submissionRow(e); apiPost({type:"submission",entry:strip(e),headers:sr.headers,row:sr.row});
  setTimeout(function(){refresh().then(render);},1200); render(); }
function strip(e){ return {name:e.name,groupPicks:e.groupPicks,koWinners:e.koWinners,groupSubmitted:!!e.groupSubmitted,groupSubmittedAt:e.groupSubmittedAt,koSubmitted:!!e.koSubmitted,koSubmittedAt:e.koSubmittedAt}; }
function adminLogin(){ var v=(document.getElementById("passInput")||{}).value||""; if(v===ADMIN_PASSCODE){ S.adminOk=true; S.passErr=false;
  S.adminScores=S.actual?JSON.parse(JSON.stringify(S.actual.groupScores||{})):{}; S.adminThirds=S.actual?JSON.parse(JSON.stringify(S.actual.thirds||{})):{}; S.adminKo=S.actual?JSON.parse(JSON.stringify(S.actual.koWinners||{})):{}; } else S.passErr=true; render(); }
function saveResults(){ var actual={groupScores:S.adminScores,thirds:S.adminThirds,koWinners:S.adminKo,updatedAt:Date.now()}; S.actual=actual;
  apiPost({type:"results",actual:actual}); var m=document.getElementById("saveMsg"); if(m)m.textContent="Saved."; setTimeout(function(){refresh().then(function(){var x=document.getElementById("saveMsg");if(x)x.textContent="";});},1200); }
function saveSettings(){ var g=document.getElementById("gDeadline").value, k=document.getElementById("kDeadline").value;
  var c={groupDeadline:g?new Date(g).toISOString():GROUP_DEADLINE_DEFAULT, koDeadline:k?new Date(k).toISOString():KO_DEADLINE_DEFAULT, koOpen:document.getElementById("koOpen").checked, locked:document.getElementById("lockAll").checked};
  S.config=c; apiPost({type:"config",config:c}); setTimeout(function(){refresh().then(render);},1000); }
function exportExcel(){ var wb=XLSX.utils.book_new(); var subs=S.submissions.filter(function(b){return b.groupSubmitted;});
  var lb=subs.map(function(b){var sc=scoreBracket(b,S.actual)||{};return {Name:b.name,Champion:(b.koWinners||{})['M104']||"","Group Pts":sc.gPts!=null?sc.gPts:"","KO Pts":sc.kPts!=null?sc.kPts:"",Total:sc.total!=null?sc.total:""};}).sort(function(a,c){return (c.Total||0)-(a.Total||0);});
  XLSX.utils.book_append_sheet(wb,XLSX.utils.json_to_sheet(lb.length?lb:[{Name:"(none)"}]),"Leaderboard");
  var header=["Name"];FIXTURES.forEach(function(f){header.push(f.group+": "+f.h+" v "+f.a);}); var gp=[header];
  if(S.actual&&Object.keys(S.actual.groupScores||{}).length){var ar=["ACTUAL"];FIXTURES.forEach(function(f){var ao=actualOutcome(S.actual.groupScores[f.id]);ar.push(ao==='H'?f.h:(ao==='A'?f.a:(ao==='D'?'Draw':'')));});gp.push(ar);}
  subs.forEach(function(b){var r=[b.name];FIXTURES.forEach(function(f){var pk=(b.groupPicks||{})[f.id];r.push(pk==='H'?f.h:(pk==='A'?f.a:(pk==='D'?'Draw':'')));});gp.push(r);});
  XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet(gp),"Group Predictions");
  var ko=subs.map(function(b){var s=reachedSets(b.koWinners||{});return {Name:b.name,Champion:s.champ||"","Runner-up":(s.F.filter(function(t){return t!==s.champ;})[0]||""),Third:s.third||"","Semi-finalists":s.SF.join(", "),"Quarter-finalists":s.QF.join(", "),"Round of 16":s.R16.join(", ")};});
  XLSX.utils.book_append_sheet(wb,XLSX.utils.json_to_sheet(ko.length?ko:[{Name:"(none)"}]),"Knockout Predictions");
  XLSX.writeFile(wb,"world-cup-2026-tipping.xlsx"); }

/* ===== DELEGATION ===== */
document.addEventListener("click",function(ev){ var t=ev.target.closest("[data-action]"); if(!t)return; var a=t.getAttribute("data-action");
  if(a==="nav-home"){S.view="home";render();}
  else if(a==="nav-board"){S.view="board";render();}
  else if(a==="nav-admin"){S.view="admin";render();}
  else if(a==="start")start();
  else if(a==="toggle-group"){var g=t.getAttribute("data-g");S._openGroup=(S._openGroup===g?null:g);render();}
  else if(a==="tip-tab"){S.tipTab=t.getAttribute("data-tab");render();}
  else if(a==="save-exit"){saveDraft(S.entry);S.view="home";render();}
  else if(a==="gpick"){ S.entry.groupPicks=S.entry.groupPicks||{}; S.entry.groupPicks[t.getAttribute("data-id")]=t.getAttribute("data-out"); render(); }
  else if(a==="submit-groups")submitGroups();
  else if(a==="submit-ko")submitKo();
  else if(a==="pick")pickAction(t.getAttribute("data-mid"),t.getAttribute("data-team"));
  else if(a==="admin-login")adminLogin();
  else if(a==="admin-tab"){S.adminTab=t.getAttribute("data-tab");render();}
  else if(a==="auto-thirds"){var as=autoAssignThirds(S.adminScores); if(as){S.adminThirds=as;} else alert("Couldn't auto-assign — please set the thirds manually."); render();}
  else if(a==="save-results")saveResults();
  else if(a==="save-settings")saveSettings();
  else if(a==="export")exportExcel();
});

/* ===== BOOT ===== */
refresh().then(function(){ S.loading=false; render(); });
</script>
